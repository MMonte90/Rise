<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RISE">

<title>RISE — Manuel Montenegro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0a}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;color:#fff;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}
.page{display:none}
.page.active{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* HEADER */
.header{padding:env(safe-area-inset-top,28px) 20px 18px;background:linear-gradient(180deg,#131313,#0a0a0a);border-bottom:1px solid #1e1e1e}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.greeting{font-size:11px;color:#888;letter-spacing:1.5px;text-transform:uppercase}
.name{font-size:28px;font-weight:900;letter-spacing:-.8px;margin-top:2px}
.streak-wrap{text-align:center}
.streak-badge{display:flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #FF3B0D44;border-radius:12px;padding:7px 13px}
.streak-num{font-size:22px;font-weight:900;color:#FF3B0D;line-height:1}
.streak-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.quote-box{background:#141414;border:1px solid #262626;border-left:3px solid #FF3B0D;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.quote-text{font-size:13px;color:#ddd;font-style:italic;line-height:1.6}
.quote-author{font-size:11px;color:#666;margin-top:6px;text-align:right}
.total-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.total-bar{height:7px;background:#222;border-radius:4px;overflow:hidden}
.total-fill{height:100%;border-radius:4px;transition:width .5s ease}
.complete-msg{text-align:center;margin-top:10px;font-size:13px;font-weight:800;color:#00C878;letter-spacing:1px}

/* WEEK DOTS */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-dot{height:34px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#161616;border:1px solid #2a2a2a;font-size:9px;font-weight:700;color:#555;gap:2px}
.day-dot.partial{background:#FF3B0D22;border-color:#FF3B0D55;color:#FF6B3D}
.day-dot.full{background:#00C87822;border-color:#00C87855;color:#00C878}

/* TOOLS GRID */
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tool-btn{background:#131313;border:1px solid #242424;border-radius:12px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:5px}
.tool-btn:active{transform:scale(.97)}
.tool-emoji{font-size:22px}
.tool-label{font-size:9px;font-weight:800;letter-spacing:.5px;color:#888}

/* PILLARS */
.pillars-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pillar-card{background:#131313;border:1px solid #242424;border-radius:13px;padding:14px 12px;text-align:left}
.pillar-card:active{transform:scale(.98)}
.pc-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pc-emoji{font-size:20px}
.pc-label{font-size:11px;font-weight:800;letter-spacing:.5px}
.mini-bar{height:5px;background:#222;border-radius:3px;overflow:hidden;margin-bottom:8px}
.mini-fill{height:100%;border-radius:3px;transition:width .4s}
.pc-stats{display:flex;justify-content:space-between;align-items:center}

/* VIDEO */
.v-card{display:flex;align-items:flex-start;gap:13px}
.v-thumb{width:52px;height:52px;background:linear-gradient(135deg,#1a0a00,#4a1800);border:1px solid #FF3B0D55;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#FF3B0D;flex-shrink:0}
.v-thumb.today{background:linear-gradient(135deg,#FF3B0D,#FF6B3D);border:none;color:#fff}
.v-name{font-weight:800;font-size:14px;margin-bottom:3px}
.v-by{font-size:12px;color:#888;margin-bottom:4px}
.v-note{font-size:12px;color:#FF6B3D;font-style:italic}

/* SECTION */
.sec{background:#131313;border:1px solid #242424;border-radius:14px;padding:15px;margin-bottom:10px}
.sec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.sec-label{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#666}
.sec-link{font-size:12px;font-weight:600;color:#FF6B3D}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,10,0.97);border-top:1px solid #222;padding:10px 16px env(safe-area-inset-bottom,14px);display:flex;align-items:center;gap:10px;z-index:999;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.bb-back{display:flex;align-items:center;gap:6px;background:#1e1e1e;border:1px solid #2e2e2e;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;color:#ccc;flex-shrink:0}
.bb-back:active{transform:scale(.97)}
.bb-title{font-size:12px;font-weight:800;color:#666;letter-spacing:.5px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bb-space{width:72px;flex-shrink:0}
.sub-wrap{padding:env(safe-area-inset-top,24px) 16px 100px;min-height:100vh}

/* TASKS */
.task-btn{display:flex;align-items:center;gap:11px;border:1px solid #2a2a2a;background:#161616;border-radius:11px;padding:13px;text-align:left;width:100%;margin-bottom:8px}
.task-check{font-size:18px;font-weight:700;width:20px;flex-shrink:0;color:#444}
.task-text{font-size:13px;line-height:1.4;flex:1;color:#bbb}
.key-tag{font-size:9px;font-weight:800;border:1px solid;border-radius:5px;padding:2px 6px;flex-shrink:0}

/* GYM */
.yt-btn{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;color:#FF3B0D;text-decoration:none}
.ex-item{display:flex;align-items:flex-start;gap:10px;background:#111;border:1px solid #222;border-radius:9px;padding:11px 13px;margin-bottom:7px}
.ex-check{width:22px;height:22px;border-radius:6px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#444}
.ex-name{font-size:13px;font-weight:700;margin-bottom:2px}
.ex-detail{font-size:11px;color:#888;line-height:1.5}
.ex-tip{font-size:11px;color:#FF6B3D;margin-top:3px;font-style:italic}

/* NUTRITION */
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.macro-box{background:#111;border:1px solid #222;border-radius:10px;padding:12px 8px;text-align:center}
.macro-num{font-size:20px;font-weight:900;line-height:1}
.macro-unit{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.macro-label{font-size:10px;color:#888;margin-top:4px}
.meal-item{background:#111;border:1px solid #222;border-radius:10px;padding:12px 13px;margin-bottom:8px}
.meal-time{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px}
.meal-title{font-size:13px;font-weight:700;margin-bottom:3px}
.meal-desc{font-size:12px;color:#888;line-height:1.5}

/* SUPPLEMENTS */
.supp-item{display:flex;align-items:flex-start;gap:12px;background:#111;border:1px solid #222;border-radius:10px;padding:12px 13px;margin-bottom:8px}
.supp-icon{font-size:22px;flex-shrink:0}
.supp-name{font-size:13px;font-weight:800;margin-bottom:2px}
.supp-dose{font-size:12px;color:#ccc;margin-bottom:3px}
.supp-why{font-size:11px;color:#888;line-height:1.5}

/* HORMONAL */
.hormone-card{background:#111;border:1px solid #222;border-radius:10px;padding:13px;margin-bottom:8px}
.hc-impact{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}

/* RUTINA */
.rutina-block{background:#111;border:1px solid #222;border-radius:11px;padding:13px;margin-bottom:8px}
.rutina-time{font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:6px}
.rutina-title{font-size:14px;font-weight:800;margin-bottom:3px}
.rutina-desc{font-size:12px;color:#aaa;line-height:1.6}
.rutina-tip{font-size:11px;margin-top:6px;font-style:italic}
.phase-badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}

/* PANTALLAS TRACKER */
.screen-display{text-align:center;padding:20px 0 10px}
.screen-num{font-size:56px;font-weight:900;line-height:1}
.screen-unit{font-size:13px;color:#888;margin-top:4px}
.screen-bar{height:10px;background:#222;border-radius:5px;overflow:hidden;margin:14px 0 8px}
.screen-fill{height:100%;border-radius:5px;transition:width .4s}
.screen-btns{display:flex;gap:10px;margin-top:10px}
.screen-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:800;border:1px solid #2a2a2a;background:#161616;color:#ccc}
.screen-btn.red{background:#FF3B0D22;border-color:#FF3B0D55;color:#FF6B3D}
.screen-btn.green{background:#00C87822;border-color:#00C87855;color:#00C878}

/* CONEXION */
.conex-item{background:#111;border:1px solid #222;border-radius:11px;padding:13px;margin-bottom:8px}
.conex-title{font-size:13px;font-weight:800;margin-bottom:4px}
.conex-desc{font-size:12px;color:#aaa;line-height:1.6}
.conex-action{font-size:12px;font-weight:700;margin-top:7px}
.week-challenge{background:linear-gradient(135deg,#1a0d20,#0d0a1a);border:1px solid #A020F055;border-radius:12px;padding:14px;margin-bottom:12px}
.wc-label{font-size:10px;font-weight:800;letter-spacing:1px;color:#C96BFF;margin-bottom:6px}
.wc-text{font-size:13px;color:#ddd;line-height:1.6}

/* COACH */
.coach-card{display:flex;align-items:center;gap:14px;background:#131313;border:1px solid #242424;border-radius:13px;padding:15px;text-align:left;margin-bottom:8px;width:100%}
.cc-emoji{font-size:24px}
.cc-title{font-size:15px;font-weight:800;color:#fff}
.cc-desc{font-size:12px;color:#666;margin-top:2px}
.coach-para{font-size:15px;margin-bottom:13px;color:#ccc;line-height:1.8}
.epic-line{font-size:17px;font-weight:900;color:#fff;letter-spacing:.5px;margin:16px 0 8px;border-left:3px solid #FF3B0D;padding-left:12px;line-height:1.4}

/* VIDEOS LIST */
.video-item{display:flex;align-items:flex-start;gap:13px;background:#131313;border:1px solid #242424;border-radius:12px;padding:13px;margin-bottom:8px}
.video-item.today{border:1px solid #FF3B0D55;background:linear-gradient(135deg,#1a0d08,#130a05)}
.today-tag{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;color:#fff;background:#FF3B0D;border-radius:5px;padding:2px 7px;margin-bottom:5px}

/* GUIDE */
.guide-block{background:#131313;border:1px solid #242424;border-radius:13px;padding:15px;margin-bottom:10px}
.guide-block.red{background:#1a0d0d;border:1px solid #FF3B0D33}
.guide-h{font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px;margin-bottom:10px}
.guide-item{font-size:12px;color:#bbb;line-height:1.65;margin-bottom:8px}
.guide-item:last-child{margin-bottom:0}

/* ALERT */
.alert-box{background:#1a1000;border:1px solid #FF8C0044;border-radius:10px;padding:13px;margin-bottom:12px}
.alert-title{font-size:12px;font-weight:800;color:#FF8C00;margin-bottom:6px}
.alert-text{font-size:12px;color:#ddd;line-height:1.6}

/* COMMON */
.hype-btn{width:100%;background:linear-gradient(135deg,#FF3B0D,#FF6B3D);border-radius:11px;color:#fff;font-weight:900;font-size:15px;padding:14px;letter-spacing:.5px;margin-bottom:10px}
.hype-btn:active{transform:scale(.98)}
.menu-btn-sm{width:100%;background:transparent;border:1px solid #2e2e2e;border-radius:10px;color:#888;font-size:13px;padding:10px}
.sub-title{font-size:22px;font-weight:900;margin:14px 0 6px}
.sub-intro{color:#aaa;font-size:13px;line-height:1.6;margin-bottom:18px}
.done-btn{width:100%;background:transparent;border:1px solid #00C878;border-radius:11px;color:#00C878;font-size:13px;font-weight:800;padding:13px;letter-spacing:.5px;margin-bottom:10px}
.done-btn.done{border:1px solid #2a2a2a;color:#555}
.footer-note{text-align:center;font-size:11px;color:#444;font-style:italic}
.g-blue{color:#4D9EFF}.g-red{color:#FF6B3D}.g-green{color:#2EE894}.g-purple{color:#C96BFF}
.divider{height:1px;background:#1e1e1e;margin:16px 0}
.pad{padding:12px 0 0}
</style>
</head>

const STORE_KEY="rise_v4";
let state={
  checked:{},streak:0,bestStreak:0,lastDone:null,
  dismissedWeak:false,gymDayIdx:0,weekLog:{},
  screenMinutes:0,screenDate:"",
};
try{const s=localStorage.getItem(STORE_KEY);if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}

// Reset screen tracker si es nuevo día
function checkScreenDay(){
  const tk=todayKey();
  if(state.screenDate!==tk){state.screenMinutes=0;state.screenDate=tk;save();}
}

// ── UTILIDADES ────────────────────────────────────────
function todayKey(){return new Date().toISOString().split("T")[0];}
function greeting(){const h=new Date().getHours();return h<12?"Buenos días":h<19?"Buenas tardes":"Buenas noches";}
function isWeekend(){const d=new Date().getDay();return d===0||d===6;}
function isNight(){return new Date().getHours()>=20;}
function dayOfYear(){const n=new Date(),s=new Date(n.getFullYear(),0,0);return Math.floor((n-s)/86400000);}
function videoOfDay(){return VIDEOS[dayOfYear()%VIDEOS.length];}
function quoteOfDay(){return EPIC_QUOTES[dayOfYear()%EPIC_QUOTES.length];}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
function isChecked(pid,i){return !!state.checked[todayKey()+"_"+pid+"_"+i];}
function toggleTask(pid,i){const k=todayKey()+"_"+pid+"_"+i;state.checked[k]=!state.checked[k];save();if(view==="dashboard")renderDash();else if(view==="pillar")render();}
function isExChecked(d,e){return !!state.checked["gym_"+d+"_"+e];}
function toggleEx(d,e){const k="gym_"+d+"_"+e;state.checked[k]=!state.checked[k];save();render();}
function pillarPct(pid){const p=PILLARS.find(x=>x.id===pid);const done=p.tasks.filter((_,i)=>isChecked(pid,i)).length;return{done,total:p.tasks.length,pct:Math.round(done/p.tasks.length*100)};}
function totalPct(){let d=0,t=0;PILLARS.forEach(p=>{const r=pillarPct(p.id);d+=r.done;t+=r.total;});return{done:d,total:t,pct:Math.round(d/t*100)};}
function weekDays(){const days=[];const now=new Date();for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];days.push({k,label:["D","L","M","X","J","V","S"][d.getDay()],pct:state.weekLog[k]||0});}return days;}
function markDone(){const tk=todayKey();if(state.lastDone!==tk){state.streak+=1;if(state.streak>state.bestStreak)state.bestStreak=state.streak;state.lastDone=tk;}state.weekLog[tk]=totalPct().pct;save();renderDash();}
function addScreen(min){checkScreenDay();state.screenMinutes+=min;if(state.screenMinutes<0)state.screenMinutes=0;save();render();}

// ── NAVEGACIÓN ────────────────────────────────────────
let view="dashboard";let viewPillar=null;let speechMode=null;let speechLines=[];
function go(v,extra){view=v;viewPillar=extra||null;window.scrollTo(0,0);render();}
function showSpeech(mode){speechMode=mode;let pool=SPEECHES[mode]||SPEECHES.hype;if(mode==="weak"&&isWeekend())pool=SPEECHES.weekend;speechLines=pick(pool);go("coach_out");}
function bottomBar(title,backAct){backAct=backAct||"back";return `<div class="bottom-bar"><button class="bb-back" data-act="${backAct}">← Volver</button><div class="bb-title">${title}</div><div class="bb-space"></div></div>`;}

    <div style="text-align:center;font-size:13px;color:#555;font-style:italic;line-height:1.7;margin-top:20px;padding:0 20px">"El hombre que quieres ser ya existe.<br>Solo tienes que ir a buscarlo."</div>
  </div>${bottomBar("GUÍA")}</div>`;
}

// ── EVENTOS ────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const act=el.getAttribute("data-act");
      if(act==="back"||act==="go-dashboard") go("dashboard");
      else if(act==="done") markDone();
      else if(act==="dismiss-weak"){state.dismissedWeak=true;save();renderDash();}
      else if(act==="pillar") go("pillar",el.getAttribute("data-pillar"));
      else if(act==="toggle") toggleTask(el.getAttribute("data-pillar"),parseInt(el.getAttribute("data-idx")));
      else if(act==="ex-toggle") toggleEx(parseInt(el.getAttribute("data-day")),parseInt(el.getAttribute("data-ex")));
      else if(act==="gym-day"){state.gymDayIdx=parseInt(el.getAttribute("data-idx"));save();render();}
      else if(act==="go-gym") go("gym");
      else if(act==="go-nutrition") go("nutrition");
      else if(act==="go-supplements") go("supplements");
      else if(act==="go-hormonal") go("hormonal");
      else if(act==="go-rutina") go("rutina");
      else if(act==="go-pantallas") go("pantallas");
      else if(act==="go-progreso") go("progreso");
      else if(act==="go-conexion") go("conexion");
      else if(act==="go-coach") go("coach");
      else if(act==="go-videos") go("videos");
      else if(act==="go-guide") go("guide");
      else if(act==="screen-add-30") addScreen(30);
      else if(act==="screen-add-15") addScreen(15);
      else if(act==="screen-sub-15") addScreen(-15);
      else if(act.startsWith("speech-")) showSpeech(act.replace("speech-",""));
    });
  });
}

render();
</script>
